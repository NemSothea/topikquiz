<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Korean Vocabulary Quiz</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #121212;
    color: #f5f5f5;
    margin: 0;
    padding: 20px;
  }
  .quiz-container {
    max-width: 700px;
    margin: auto;
    background: #1e1e1e;
    padding: 20px;
    border-radius: 10px;
  }
  h2 { color: #ffcc00; }
  button {
    display: block;
    width: 100%;
    margin: 10px 0;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: #333;
    color: #fff;
    cursor: pointer;
    transition: 0.3s;
  }
  button:hover { background: #444; }
  .correct { background: #2e7d32 !important; }
  .wrong { background: #c62828 !important; }
  .scoreboard {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 8px;
  }
  .examples {
    margin-top: 20px;
    padding: 15px;
    background: #222;
    border-radius: 8px;
  }
  .examples h3 { color: #ffcc00; }
  .wrong-list {
    margin-top: 10px;
    color: #ff9999;
  }
</style>
</head>
<body>
<div class="quiz-container">
  <h2 id="question">Loading...</h2>
  <div id="options"></div>
  <div class="scoreboard">
    <p>Score: <span id="score">0</span> / <span id="total">0</span></p>
    <div id="wrongAnswers" class="wrong-list"></div>
  </div>
  <div class="examples">
    <h3>Vocabulary Check with Examples</h3>
    <ul id="examplesList"></ul>
  </div>
</div>

<script>
const vocabExamples = [
  {k:"방어하다", e:"Defend", ex:"그는 공격을 방어했다."},
  {k:"아끼다", e:"Save", ex:"돈을 아끼는 것이 중요하다."},
  {k:"부정적", e:"Negative", ex:"그녀는 부정적인 태도를 보였다."},
  {k:"이루다", e:"Achieve", ex:"그는 꿈을 이루었다."},
  {k:"쉽다", e:"Easy", ex:"이 문제는 쉽다."},
  {k:"믿음", e:"Faith", ex:"믿음은 사람을 강하게 만든다."},
  {k:"빌리다", e:"Borrow", ex:"나는 책을 빌렸다."},
  {k:"교육하다", e:"Educate", ex:"선생님은 학생들을 교육한다."},
  {k:"내년", e:"Next year", ex:"내년에 여행을 갈 것이다."},
  {k:"확장하다", e:"Expand", ex:"회사를 확장하다."},
  {k:"관심을 끌다", e:"Attract attention", ex:"그는 발표로 관심을 끌었다."},
  {k:"만들다", e:"Make", ex:"그는 케이크를 만들었다."},
  {k:"정보", e:"Information", ex:"인터넷에서 정보를 찾다."},
  {k:"자기개발", e:"Self-development", ex:"자기개발은 중요하다."},
  {k:"쇠퇴하다", e:"Decline", ex:"그 나라는 경제적으로 쇠퇴했다."}
];

const quiz = [
  {q:"방어하다 = ?", options:["Borrow","Defend","Decline","Save"], answer:1},
  {q:"아끼다 = ?", options:["Save","Make","Expand","Educate"], answer:0},
  {q:"부정적 = ?", options:["Negative","Faith","Easy","Information"], answer:0},
  {q:"이루다 = ?", options:["Achieve","Decline","Borrow","Defend"], answer:0},
  {q:"쉽다 = ?", options:["Easy","Self-development","Expand","Negative"], answer:0},
  {q:"믿음 = ?", options:["Faith","Information","Save","Decline"], answer:0},
  {q:"빌리다 = ?", options:["Borrow","Defend","Make","Achieve"], answer:0},
  {q:"교육하다 = ?", options:["Educate","Decline","Save","Attract attention"], answer:0},
  {q:"내년 = ?", options:["Next year","Easy","Faith","Decline"], answer:0},
  {q:"확장하다 = ?", options:["Expand","Save","Negative","Borrow"], answer:0},
  {q:"관심을 끌다 = ?", options:["Attract attention","Make","Decline","Defend"], answer:0},
  {q:"만들다 = ?", options:["Make","Save","Faith","Educate"], answer:0},
  {q:"정보 = ?", options:["Information","Decline","Easy","Borrow"], answer:0},
  {q:"자기개발 = ?", options:["Self-development","Defend","Save","Negative"], answer:0},
  {q:"쇠퇴하다 = ?", options:["Decline","Expand","Make","Faith"], answer:0}
];

let current = 0;
let score = 0;
let total = 0;
let wrongAnswers = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const scoreEl = document.getElementById("score");
const totalEl = document.getElementById("total");
const wrongEl = document.getElementById("wrongAnswers");
const examplesList = document.getElementById("examplesList");

function loadExamples() {
  vocabExamples.forEach(v=>{
    const li = document.createElement("li");
    li.textContent = `${v.k} = ${v.e} → ${v.ex}`;
    examplesList.appendChild(li);
  });
}

function loadQuestion() {
  const q = quiz[current];
  questionEl.textContent = q.q;
  optionsEl.innerHTML = "";
  q.options.forEach((opt,i)=>{
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.onclick = ()=>checkAnswer(i,btn);
    optionsEl.appendChild(btn);
  });
}

function checkAnswer(i,btn) {
  total++;
  if(i===quiz[current].answer){
    btn.classList.add("correct");
    score++;
  } else {
    btn.classList.add("wrong");
    wrongAnswers.push(`${quiz[current].q} → Correct: ${quiz[current].options[quiz[current].answer]}`);
  }
  updateScore();
  setTimeout(()=>{
    current = (current+1)%quiz.length; // cycles for SRS
    loadQuestion();
  },1000);
}

function updateScore() {
  scoreEl.textContent = score;
  totalEl.textContent = total;
  wrongEl.innerHTML = "<strong>Review Wrong Answers:</strong><br>" + wrongAnswers.join("<br>");
}

loadExamples();
loadQuestion();
</script>
</body>
</html>
